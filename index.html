<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Epic RingWeasel</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background: #2c3e50;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: Arial, sans-serif;
        }
        
        .game-container {
            background: #34495e;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        
        canvas {
            border: 3px solid #ecf0f1;
            background: #000;
            display: block;
            border-radius: 5px;
            cursor: crosshair;
        }
        
        .controls {
            color: white;
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
        }
        
        .controls h3 {
            margin: 0 0 10px 0;
            color: #ecf0f1;
        }
        
        .key {
            background: #3498db;
            color: white;
            padding: 4px 8px;
            border-radius: 3px;
            font-weight: bold;
            margin: 0 2px;
        }
        
        #replayBtn {
            background: #2ecc71;
            color: white;
            padding: 12px 24px;
            font-size: 16px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 10px;
        }
        
        #replayBtn:hover {
            background: #27ae60;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        <div class="controls">
            <h3>Controls</h3>
            <p>Use the <span class="key">↑</span><span class="key">←</span><span class="key">↓</span><span class="key">→</span> arrow keys to move the weasel</p>
        </div>
        <button id="replayBtn" style="display:none;">Play Again</button>
    </div>

    <script>
        class WeaselGame {
            constructor() {
                this.canvas = document.getElementById('gameCanvas');
                this.ctx = this.canvas.getContext('2d');
                
                // Game settings
                this.gameWidth = this.canvas.width;
                this.gameHeight = this.canvas.height;
                
                // Player settings
                this.player = {
                    x: this.gameWidth / 2,
                    y: this.gameHeight / 2,
                    width: 64,
                    height: 64,
                    speed: 5,
                    image: null,
                    imageLoaded: false
                };
                
                // Input handling (arrow keys)
                this.keys = {
                    up: false,
                    down: false,
                    left: false,
                    right: false
                };
                
                // Lives and shield state
                this.lives = 3;
                this.shield = { active: false, duration: 5000, timer: 0 };

                // Powerups (speed pellets and shields)
                this.powerups = [];
                this.powerupSpawnDelay = 10000; // 10 seconds between powerups
                this.lastPowerupSpawn = 0;
                
                // Game state
                this.gameState = 'playing'; // 'playing' or 'gameOver'
                this.gameStartTime = Date.now();
                this.gameEndTime = null;
                
                // Rings
                this.rings = [];
                this.ringSpawnDelay = 3000; // 3 seconds
                this.lastRingSpawn = 0;
                this.ringsSpawned = 0;
                
                // Health drops
                this.healthDrops = [];
                this.healthDropSpawnChance = 0.3; // 30% chance per second
                
                // Gold coins
                this.goldCoins = [];
                this.goldCoinSpawnChance = 0.5; // 50% chance per second
                
                // Difficulty scaling
                this.difficultyMultiplier = 1;
                this.lastDifficultyCheck = Date.now();
                
                this.init();
            }
            
            init() {
                // Load player sprite
                this.player.image = new Image();
                this.player.image.onload = () => {
                    this.player.imageLoaded = true;
                };
                this.player.image.onerror = () => {
                    console.log('Could not load weasel.png, using placeholder');
                    this.player.imageLoaded = false;
                };
                this.player.image.src = 'weasel.png';
                
                // Set up event listeners
                this.setupInputHandlers();
                
                // Start game loop
                this.gameLoop();
            }
            
            setupInputHandlers() {
                document.addEventListener('keydown', (e) => {
                    switch(e.key) {
                        case 'ArrowUp':
                            this.keys.up = true;
                            break;
                        case 'ArrowLeft':
                            this.keys.left = true;
                            break;
                        case 'ArrowDown':
                            this.keys.down = true;
                            break;
                        case 'ArrowRight':
                            this.keys.right = true;
                            break;
                    }
                    e.preventDefault();
                });
                
                document.addEventListener('keyup', (e) => {
                    switch(e.key) {
                        case 'ArrowUp':
                            this.keys.up = false;
                            break;
                        case 'ArrowLeft':
                            this.keys.left = false;
                            break;
                        case 'ArrowDown':
                            this.keys.down = false;
                            break;
                        case 'ArrowRight':
                            this.keys.right = false;
                            break;
                    }
                    e.preventDefault();
                });
                
                // Mouse tracking for shield aiming
                document.addEventListener('mousemove', (e) => {
                    const rect = this.canvas.getBoundingClientRect();
                    this.shield.mouseX = e.clientX - rect.left;
                    this.shield.mouseY = e.clientY - rect.top;
                });
                
                // Replay button
                document.getElementById('replayBtn').addEventListener('click', () => {
                    this.resetGame();
                });
            }
            
            resetGame() {
                this.health = 1;
                this.score = 0;
                this.gameState = 'playing';
                this.gameStartTime = Date.now();
                this.gameEndTime = null;
                this.rings = [];
                this.healthDrops = [];
                this.goldCoins = [];
                this.ringsSpawned = 0;
                this.difficultyMultiplier = 1;
                this.lastDifficultyCheck = Date.now();
                this.player.x = this.gameWidth / 2;
                this.player.y = this.gameHeight / 2;
                document.getElementById('replayBtn').style.display = 'none';
            }
            
            update() {
                if (this.gameState === 'gameOver') return;
                
                // Check difficulty scaling every 10 seconds
                const currentTime = Date.now();
                const elapsedSeconds = (currentTime - this.gameStartTime) / 1000;
                const newDifficultyMultiplier = 1 + Math.floor(elapsedSeconds / 10) * 0.2;
                
                if (newDifficultyMultiplier !== this.difficultyMultiplier) {
                    this.difficultyMultiplier = newDifficultyMultiplier;
                    // Increase ring speed that will be spawned next
                }
                
                // Spawn rings with difficulty scaling
                const adjustedSpawnDelay = this.ringSpawnDelay / this.difficultyMultiplier;
                if (this.ringsSpawned < 1 + Math.floor(elapsedSeconds / 10) && 
                    currentTime - this.gameStartTime > adjustedSpawnDelay * (this.ringsSpawned + 1)) {
                    this.spawnRing();
                    this.ringsSpawned++;
                }

                // Spawn a powerup periodically
                if (currentTime - this.lastPowerupSpawn > this.powerupSpawnDelay) {
                    this.spawnPowerup();
                    this.lastPowerupSpawn = currentTime;
                }

                // Handle movement (arrow keys)
                if (this.keys.up) {
                    this.player.y -= this.player.speed;
                }
                if (this.keys.down) {
                    this.player.y += this.player.speed;
                }
                if (this.keys.left) {
                    this.player.x -= this.player.speed;
                }
                if (this.keys.right) {
                    this.player.x += this.player.speed;
                }
                
                // Keep player within boundaries
                this.player.x = Math.max(0, Math.min(this.gameWidth - this.player.width, this.player.x));
                this.player.y = Math.max(0, Math.min(this.gameHeight - this.player.height, this.player.y));
                
                // Update shield position to face the mouse
                const playerCenterX = this.player.x + this.player.width / 2;
                const playerCenterY = this.player.y + this.player.height / 2;
                const angle = Math.atan2(this.shield.mouseY - playerCenterY, this.shield.mouseX - playerCenterX);
                this.shield.x = playerCenterX + Math.cos(angle) * 50;
                this.shield.y = playerCenterY + Math.sin(angle) * 50;
                
                // Update rings
                this.updateRings();

                // Update powerups (check expiration etc.)
                this.updatePowerups();

                // Check collisions with powerups first (collect any)
                this.checkPowerupCollisions();

                // Check collisions with rings (lives/shield logic)
                this.checkCollisions();
                this.checkHealthDropCollisions();
                this.checkGoldCoinCollisions();
            }
            
            draw() {
                // Clear canvas
                this.ctx.clearRect(0, 0, this.gameWidth, this.gameHeight);
                
                // Draw black background
                this.ctx.fillStyle = '#000';
                this.ctx.fillRect(0, 0, this.gameWidth, this.gameHeight);
                
                // Draw rings
                this.drawRings();

                // Draw powerups
                this.drawPowerups();
                
                // Draw health drops
                this.drawHealthDrops();
                
                // Draw gold coins
                this.drawGoldCoins();
                
                // Draw player
                this.drawPlayer();
                
                // Draw shield
                this.drawShield();
                
                // Draw UI
                this.drawUI();
                
                // Draw game over screen if needed
                if (this.gameState === 'gameOver') {
                    this.drawGameOver();
                }
            }
            
            spawnRing() {
                const ring = {
                    x: Math.random() * (this.gameWidth - 60),
                    y: Math.random() * (this.gameHeight - 60),
                    radius: 30,
                    speed: (8 + (this.ringsSpawned * 2)) * this.difficultyMultiplier,
                    dx: (Math.random() - 0.5) * 2,
                    dy: (Math.random() - 0.5) * 2
                };
                
                // Normalize direction vector
                const length = Math.sqrt(ring.dx * ring.dx + ring.dy * ring.dy);
                ring.dx = (ring.dx / length) * ring.speed;
                ring.dy = (ring.dy / length) * ring.speed;
                
                this.rings.push(ring);
            }
            
            spawnHealthDrop() {
                const drop = {
                    x: Math.random() * (this.gameWidth - 20),
                    y: Math.random() * (this.gameHeight - 20),
                    radius: 10,
                    collected: false
                };
                this.healthDrops.push(drop);
            }
            
            spawnGoldCoin() {
                const coin = {
                    x: Math.random() * (this.gameWidth - 15),
                    y: Math.random() * (this.gameHeight - 15),
                    radius: 8,
                    collected: false
                };
                this.goldCoins.push(coin);
            }
            
            updateRings() {
                // Check ring-to-ring collisions first
                for (let i = 0; i < this.rings.length; i++) {
                    for (let j = i + 1; j < this.rings.length; j++) {
                        this.checkRingCollision(this.rings[i], this.rings[j]);
                    }
                }
                
                // Update ring positions
                for (let ring of this.rings) {
                    // Move ring
                    ring.x += ring.dx;
                    ring.y += ring.dy;
                    
                    // Bounce off walls
                    if (ring.x - ring.radius <= 0 || ring.x + ring.radius >= this.gameWidth) {
                        ring.dx = -ring.dx;
                        ring.x = Math.max(ring.radius, Math.min(this.gameWidth - ring.radius, ring.x));
                    }
                    if (ring.y - ring.radius <= 0 || ring.y + ring.radius >= this.gameHeight) {
                        ring.dy = -ring.dy;
                        ring.y = Math.max(ring.radius, Math.min(this.gameHeight - ring.radius, ring.y));
                    }
                }
            }

            // ----- powerup helpers -----
            spawnPowerup() {
                const type = Math.random() < 0.5 ? 'speed' : 'shield';
                const powerup = {
                    x: Math.random() * (this.gameWidth - 40) + 20,
                    y: Math.random() * (this.gameHeight - 40) + 20,
                    size: 20,
                    type,
                    created: Date.now()
                };
                this.powerups.push(powerup);
            }

            updatePowerups() {
                // remove expired shield if any
                if (this.shield.active && Date.now() - this.shield.timer > this.shield.duration) {
                    this.shield.active = false;
                }
                // remove powerups that have sat too long
                const now = Date.now();
                this.powerups = this.powerups.filter(p => now - p.created < 15000);
            }

            drawPowerups() {
                for (let p of this.powerups) {
                    if (p.type === 'speed') {
                        this.ctx.fillStyle = '#2ecc71'; // green
                    } else if (p.type === 'shield') {
                        this.ctx.fillStyle = '#3498db'; // blue
                    }
                    this.ctx.beginPath();
                    this.ctx.arc(p.x, p.y, p.size / 2, 0, Math.PI * 2);
                    this.ctx.fill();
                    this.ctx.strokeStyle = '#fff';
                    this.ctx.lineWidth = 2;
                    this.ctx.stroke();
                }
            }

            checkPowerupCollisions() {
                const playerCenterX = this.player.x + this.player.width / 2;
                const playerCenterY = this.player.y + this.player.height / 2;
                const playerRadius = Math.min(this.player.width, this.player.height) / 2;

                for (let i = 0; i < this.powerups.length; i++) {
                    let p = this.powerups[i];
                    const dist = Math.sqrt(
                        Math.pow(playerCenterX - p.x, 2) +
                        Math.pow(playerCenterY - p.y, 2)
                    );
                    if (dist < playerRadius + p.size / 2) {
                        // collect powerup
                        if (p.type === 'speed') {
                            this.player.speed += 1;
                        } else if (p.type === 'shield') {
                            this.shield.active = true;
                            this.shield.timer = Date.now();
                        }
                        this.powerups.splice(i, 1);
                        i--;
                    }
                }
            }
            
            checkRingCollision(ring1, ring2) {
                const dx = ring2.x - ring1.x;
                const dy = ring2.y - ring1.y;
                const distance = Math.sqrt(dx * dx + dy * dy);
                
                if (distance < ring1.radius + ring2.radius) {
                    // Calculate collision normal
                    const normalX = dx / distance;
                    const normalY = dy / distance;
                    
                    // Separate rings to prevent overlap
                    const overlap = ring1.radius + ring2.radius - distance;
                    const separationX = normalX * overlap * 0.5;
                    const separationY = normalY * overlap * 0.5;
                    
                    ring1.x -= separationX;
                    ring1.y -= separationY;
                    ring2.x += separationX;
                    ring2.y += separationY;
                    
                    // Calculate relative velocity
                    const relativeVelocityX = ring2.dx - ring1.dx;
                    const relativeVelocityY = ring2.dy - ring1.dy;
                    
                    // Calculate relative velocity along normal
                    const velocityAlongNormal = relativeVelocityX * normalX + relativeVelocityY * normalY;
                    
                    // Don't resolve if objects are separating
                    if (velocityAlongNormal > 0) return;
                    
                    // Calculate impulse scalar (assuming equal mass)
                    const impulse = -2 * velocityAlongNormal / 2;
                    
                    // Apply impulse to velocities
                    ring1.dx -= impulse * normalX;
                    ring1.dy -= impulse * normalY;
                    ring2.dx += impulse * normalX;
                    ring2.dy += impulse * normalY;
                }
            }
            
            checkCollisions() {
                const playerCenterX = this.player.x + this.player.width / 2;
                const playerCenterY = this.player.y + this.player.height / 2;
                const playerRadius = Math.min(this.player.width, this.player.height) / 2;

                for (let i = 0; i < this.rings.length; i++) {
                    let ring = this.rings[i];
                    const distance = Math.sqrt(
                        Math.pow(playerCenterX - ring.x, 2) + 
                        Math.pow(playerCenterY - ring.y, 2)
                    );

                    if (distance < playerRadius + ring.radius) {
                        // shield protects once
                        if (this.shield.active) {
                            this.shield.active = false;
                            this.rings.splice(i, 1);
                            i--;
                            continue;
                        }
                        // lose a life and remove ring
                        this.lives--;
                        this.rings.splice(i, 1);
                        i--;
                        if (this.lives <= 0) {
                            this.gameState = 'gameOver';
                            this.gameEndTime = Date.now();
                            return;
                        }
                    }
                }
            }
            
            checkHealthDropCollisions() {
                const playerCenterX = this.player.x + this.player.width / 2;
                const playerCenterY = this.player.y + this.player.height / 2;
                
                for (let drop of this.healthDrops) {
                    const distance = Math.sqrt(
                        Math.pow(playerCenterX - drop.x, 2) + 
                        Math.pow(playerCenterY - drop.y, 2)
                    );
                    
                    if (distance < 32 + drop.radius) {
                        // Collect health drop
                        if (this.health < this.maxHealth) {
                            this.health++;
                        }
                        drop.collected = true;
                    }
                }
                
                // Remove collected drops
                this.healthDrops = this.healthDrops.filter(drop => !drop.collected);
            }
            
            checkGoldCoinCollisions() {
                const playerCenterX = this.player.x + this.player.width / 2;
                const playerCenterY = this.player.y + this.player.height / 2;
                
                for (let coin of this.goldCoins) {
                    const distance = Math.sqrt(
                        Math.pow(playerCenterX - coin.x, 2) + 
                        Math.pow(playerCenterY - coin.y, 2)
                    );
                    
                    if (distance < 32 + coin.radius) {
                        // Collect coin
                        this.score++;
                        coin.collected = true;
                    }
                }
                
                // Remove collected coins
                this.goldCoins = this.goldCoins.filter(coin => !coin.collected);
            }
            
            drawRings() {
                this.ctx.strokeStyle = '#ff0000';
                this.ctx.lineWidth = 4;
                
                for (let ring of this.rings) {
                    this.ctx.beginPath();
                    this.ctx.arc(ring.x, ring.y, ring.radius, 0, Math.PI * 2);
                    this.ctx.stroke();
                }
            }
            
            drawHealthDrops() {
                this.ctx.fillStyle = '#ff3366';
                
                for (let drop of this.healthDrops) {
                    this.ctx.beginPath();
                    this.ctx.arc(drop.x, drop.y, drop.radius, 0, Math.PI * 2);
                    this.ctx.fill();
                    
                    // Draw plus sign
                    this.ctx.strokeStyle = '#fff';
                    this.ctx.lineWidth = 2;
                    this.ctx.beginPath();
                    this.ctx.moveTo(drop.x, drop.y - 5);
                    this.ctx.lineTo(drop.x, drop.y + 5);
                    this.ctx.moveTo(drop.x - 5, drop.y);
                    this.ctx.lineTo(drop.x + 5, drop.y);
                    this.ctx.stroke();
                }
            }
            
            drawGoldCoins() {
                this.ctx.fillStyle = '#FFD700';
                
                for (let coin of this.goldCoins) {
                    this.ctx.beginPath();
                    this.ctx.arc(coin.x, coin.y, coin.radius, 0, Math.PI * 2);
                    this.ctx.fill();
                    
                    // Draw coin border
                    this.ctx.strokeStyle = '#FFA500';
                    this.ctx.lineWidth = 2;
                    this.ctx.stroke();
                }
            }
            
            drawBackground() {
                // Create a simple grass pattern
                this.ctx.fillStyle = '#2ecc71';
                this.ctx.fillRect(0, 0, this.gameWidth, this.gameHeight);
                
                // Add some texture with darker green dots
                this.ctx.fillStyle = '#27ae60';
                for (let x = 0; x < this.gameWidth; x += 20) {
                    for (let y = 0; y < this.gameHeight; y += 20) {
                        if (Math.random() > 0.7) {
                            this.ctx.fillRect(x, y, 2, 2);
                        }
                    }
                }
            }
            
            drawShield() {
                // Draw shield circle with semi-transparent fill
                this.ctx.fillStyle = 'rgba(52, 152, 219, 0.3)';
                this.ctx.beginPath();
                this.ctx.arc(this.shield.x, this.shield.y, this.shield.radius, 0, Math.PI * 2);
                this.ctx.fill();
                
                // Draw shield border
                this.ctx.strokeStyle = '#3498db';
                this.ctx.lineWidth = 3;
                this.ctx.stroke();
            }
            
            drawPlayer() {
                if (this.player.imageLoaded && this.player.image.complete) {
                    // Draw the weasel image
                    this.ctx.drawImage(
                        this.player.image,
                        this.player.x,
                        this.player.y,
                        this.player.width,
                        this.player.height
                    );
                } else {
                    // Draw placeholder if image not loaded
                    this.ctx.fillStyle = '#8B4513';
                    this.ctx.fillRect(this.player.x, this.player.y, this.player.width, this.player.height);
                    
                    // Add some basic weasel features
                    this.ctx.fillStyle = '#654321';
                    this.ctx.fillRect(this.player.x + 5, this.player.y + 5, 54, 54);
                    
                    // Eyes
                    this.ctx.fillStyle = '#000';
                    this.ctx.fillRect(this.player.x + 15, this.player.y + 15, 8, 8);
                    this.ctx.fillRect(this.player.x + 35, this.player.y + 15, 8, 8);
                    
                    // Nose
                    this.ctx.fillStyle = '#FF69B4';
                    this.ctx.fillRect(this.player.x + 28, this.player.y + 30, 6, 4);
                    
                    // Label
                    this.ctx.fillStyle = '#fff';
                    this.ctx.font = '12px Arial';
                    this.ctx.textAlign = 'center';
                }
            }
            
            drawUI() {
                // Draw health point
                this.ctx.fillStyle = 'rgba(255, 255, 255, 0.2)';
                this.ctx.fillRect(10, 10, 200, 60);
                
                this.ctx.fillStyle = '#fff';
                this.ctx.font = '14px Arial';
                this.ctx.textAlign = 'left';
                this.ctx.fillText(`Position: ${Math.round(this.player.x)}, ${Math.round(this.player.y)}`, 20, 30);
                this.ctx.fillText(`Speed: ${this.player.speed}`, 20, 50);
                this.ctx.fillText(`Lives: ${this.lives}`, 20, 70);
                this.ctx.fillText(`Rings: ${this.rings.length}/3`, 20, 90);
                
                // Show shield status
                this.ctx.fillStyle = this.shield.active ? '#2ecc71' : '#ff0000';
                this.ctx.fillText(`Shield: ${this.shield.active ? 'ON' : 'OFF'}`, 20, 110);
                this.ctx.fillStyle = '#fff';
                
                // Draw survival time and difficulty
                const currentTime = this.gameState === 'gameOver' ? this.gameEndTime : Date.now();
                const survivalTime = Math.floor((currentTime - this.gameStartTime) / 1000);
                this.ctx.fillStyle = 'rgba(255, 255, 255, 0.2)';
                this.ctx.fillRect(this.gameWidth - 180, 10, 170, 60);
                this.ctx.fillStyle = '#fff';
                this.ctx.textAlign = 'right';
                this.ctx.fillText(`Time: ${survivalTime}s`, this.gameWidth - 20, 30);
                this.ctx.fillText(`Difficulty: ${this.difficultyMultiplier.toFixed(1)}x`, this.gameWidth - 20, 50);
            }
            
            drawGameOver() {
                // Draw overlay
                this.ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
                this.ctx.fillRect(0, 0, this.gameWidth, this.gameHeight);
                
                // Draw game over text
                this.ctx.fillStyle = '#ff0000';
                this.ctx.font = 'bold 48px Arial';
                this.ctx.textAlign = 'center';
                this.ctx.fillText('GAME OVER', this.gameWidth / 2, this.gameHeight / 2 - 60);
                
                const survivalTime = Math.floor((this.gameEndTime - this.gameStartTime) / 1000);
                this.ctx.fillStyle = '#fff';
                this.ctx.font = '24px Arial';
                this.ctx.fillText(`You survived ${survivalTime} seconds!`, this.gameWidth / 2, this.gameHeight / 2);
                this.ctx.fillText(`Final Score: ${this.score}`, this.gameWidth / 2, this.gameHeight / 2 + 40);
                
                // Show replay button
                document.getElementById('replayBtn').style.display = 'block';
            }
            
            gameLoop() {
                this.update();
                this.draw();
                requestAnimationFrame(() => this.gameLoop());
            }
        }
        
        // Start the game when page loads
        window.addEventListener('load', () => {
            new WeaselGame();
        });
    </script>
</body>
</html>
